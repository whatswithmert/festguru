<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FestGuru Admin</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080808; color: #d4cfc5; font-family: monospace; padding: 2rem; }
h1 { font-size: 20px; color: #b8f250; margin-bottom: 2rem; letter-spacing: 3px; }
h2 { font-size: 14px; color: #b8f250; margin-bottom: 1rem; letter-spacing: 2px; margin-top: 2rem; }
.form { background: #161616; border: 1px solid #2a2a2a; border-radius: 8px; padding: 1.5rem; margin-bottom: 2rem; }
input, textarea, select { width: 100%; background: #0a0a0a; border: 1px solid #333; color: #d4cfc5; padding: 8px; border-radius: 4px; font-family: monospace; font-size: 12px; margin-bottom: 8px; }
label { font-size: 10px; color: #555; letter-spacing: 1px; display: block; margin-bottom: 3px; text-transform: uppercase; }
button { background: #b8f250; color: #080808; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; font-family: monospace; }
.card { background: #161616; border: 1px solid #2a2a2a; border-radius: 6px; padding: 1rem; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
.delete-btn { background: #ff4444; color: white; border: none; padding: 5px 10px; border-radius: 4px; cursor: pointer; font-size: 11px; }
.msg { font-size: 12px; color: #666; margin-top: 8px; }
#login { max-width: 300px; margin: 100px auto; }
#main { display: none; }
</style>
</head>
<body>
<div id="login">
  <h1>FESTGURU / ADMIN</h1>
  <input type="password" id="pwd" placeholder="password" />
  <br><br>
  <button onclick="login()">Enter</button>
</div>

<div id="main">
  <h1>FESTGURU / ADMIN</h1>

  <h2>UPLOAD FESTIVALS (EXCEL)</h2>
  <div class="form">
    <label>Excel File</label>
    <input type="file" id="ufile" accept=".xlsx" style="color:#d4cfc5" />
    <br>
    <button onclick="uploadExcel()">Upload Excel</button>
    <div class="msg" id="upload-msg"></div>
  </div>

  <h2>ADD FESTIVAL MANUALLY</h2>
  <div class="form">
    <label>Festival Name</label><input id="fname" placeholder="Awakenings" />
    <label>Country</label><input id="fcountry" placeholder="Netherlands" />
    <label>City</label><input id="fcity" placeholder="Amsterdam" />
    <label>Start Date (YYYY-MM-DD)</label><input id="fstart" placeholder="2026-06-20" />
    <label>End Date (YYYY-MM-DD)</label><input id="fend" placeholder="2026-06-21" />
    <label>Genres (comma separated)</label><input id="fgenres" placeholder="techno, house" />
    <label>Vibe (comma separated)</label><input id="fvibe" placeholder="underground, raw" />
    <label>Lineup (comma separated)</label><textarea id="lineup" rows="2" placeholder="Charlotte de Witte, Amelie Lens"></textarea>
    <label>Price (€)</label><input id="fprice" type="number" value="0" />
    <label>URL</label><input id="furl" placeholder="https://..." />
    <label>Notes</label><textarea id="fnotes" rows="2"></textarea>
    <button onclick="addFestival()">+ Add Festival</button>
  </div>

  <h2>FESTIVALS</h2>
  <div id="fest-list"></div>
</div>

<script>
let PWD = '';

function login() {
  PWD = document.getElementById('pwd').value;
  fetch('/festivals').then(r => r.json()).then(data => {
    document.getElementById('login').style.display = 'none';
    document.getElementById('main').style.display = 'block';
    renderList(data);
  });
}

async function loadFestivals() {
  const res = await fetch('/festivals');
  const data = await res.json();
  renderList(data);
}

function renderList(data) {
  document.getElementById('fest-list').innerHTML = data.length === 0
    ? '<p style="color:#444;font-size:12px">No festivals yet.</p>'
    : data.map(f => '<div class="card"><div><strong>' + f.name + '</strong><span style="color:#666;font-size:11px;margin-left:10px">' + f.city + ' — ' + f.start_date + '</span></div><button class="delete-btn" onclick="deleteFest(' + f.id + ')">delete</button></div>').join('');
}

async function addFestival() {
  const body = {
    name: document.getElementById('fname').value,
    country: document.getElementById('fcountry').value,
    city: document.getElementById('fcity').value,
    start_date: document.getElementById('fstart').value,
    end_date: document.getElementById('fend').value,
    genres: document.getElementById('fgenres').value.split(',').map(s=>s.trim()),
    vibe: document.getElementById('fvibe').value.split(',').map(s=>s.trim()),
    lineup: document.getElementById('lineup').value.split(',').map(s=>s.trim()),
    price: parseInt(document.getElementById('fprice').value),
    url: document.getElementById('furl').value,
    notes: document.getElementById('fnotes').value
  };
  await fetch('/admin/festivals', { method: 'POST', headers: { 'Content-Type': 'application/json', 'x-admin-password': PWD }, body: JSON.stringify(body) });
  loadFestivals();
}

async function deleteFest(id) {
  await fetch('/admin/festivals/' + id, { method: 'DELETE', headers: { 'x-admin-password': PWD } });
  loadFestivals();
}

async function uploadExcel() {
  const file = document.getElementById('ufile').files[0];
  if (!file) { alert('Select a file first'); return; }
  const formData = new FormData();
  formData.append('file', file);
  const res = await fetch('/admin/upload', { method: 'POST', headers: { 'x-admin-password': PWD }, body: formData });
  const result = await res.json();
  document.getElementById('upload-msg').textContent = result.added + ' festivals added.';
  loadFestivals();
}
</script>
</body>
</html>
