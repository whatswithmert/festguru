<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FestGuru — Festivals</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #080808; color: #d4cfc5; font-family: 'DM Mono', monospace; min-height: 100vh; padding: 2rem; max-width: 800px; margin: 0 auto; }
a { color: inherit; text-decoration: none; }
.nav { display: flex; align-items: center; gap: 24px; margin-bottom: 2.5rem; }
.logo { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 4px; color: #fff; }
.logo span { color: #b8f250; }
.nav-links { display: flex; gap: 16px; margin-left: auto; }
.nav-link { font-size: 10px; letter-spacing: 2px; color: #444; }
.nav-link:hover, .nav-link.active { color: #b8f250; }
.search-wrap { border: 0.5px solid #222; border-radius: 4px; margin-bottom: 1rem; display: flex; align-items: center; padding: 0 14px; }
.search-wrap input { flex: 1; background: transparent; border: none; outline: none; font-family: 'DM Mono', monospace; font-size: 13px; color: #d4cfc5; padding: 12px 0; }
.search-wrap input::placeholder { color: #333; }
.search-wrap .clear { color: #333; cursor: pointer; font-size: 16px; }
.search-wrap .clear:hover { color: #666; }
.filters { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 1.5rem; }
.filter-label { font-size: 9px; letter-spacing: 2px; color: #333; width: 100%; margin-top: 8px; }
.chip { padding: 3px 10px; border: 0.5px solid #222; border-radius: 2px; font-size: 10px; letter-spacing: 1px; cursor: pointer; color: #444; transition: all 0.1s; }
.chip:hover { color: #888; }
.chip.on { color: #b8f250; border-color: #b8f250; }
.results-meta { font-size: 9px; letter-spacing: 2px; color: #333; margin-bottom: 12px; }
.card { border: 0.5px solid #1e1e1e; border-radius: 2px; padding: 14px 16px; margin-bottom: 6px; display: block; transition: border-color 0.1s; }
.card:hover { border-color: #333; }
.card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 4px; }
.fest-name { font-family: 'Bebas Neue', sans-serif; font-size: 17px; letter-spacing: 2px; color: #fff; }
.country-badge { font-size: 9px; letter-spacing: 1px; color: #444; border: 0.5px solid #222; padding: 2px 6px; }
.fest-meta { font-size: 10px; color: #333; margin-bottom: 8px; letter-spacing: 1px; }
.genre-tags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
.genre-tag { font-size: 9px; letter-spacing: 1px; color: #444; border: 0.5px solid #1e1e1e; padding: 2px 7px; }
.artist-match { font-size: 10px; color: #b8f250; margin-top: 6px; }
.empty { font-size: 11px; color: #333; text-align: center; padding: 60px 0; letter-spacing: 2px; }
.loading { font-size: 10px; letter-spacing: 2px; color: #333; text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<nav class="nav">
  <a href="/" class="logo">FEST<span>GURU</span></a>
  <div class="nav-links">
    <a href="/" class="nav-link">DISCOVER</a>
    <a href="/festivals.html" class="nav-link active">FESTIVALS</a>
  </div>
</nav>
<div class="search-wrap">
  <input type="text" id="searchInput" placeholder="Search festivals or artists..." oninput="onSearch(this.value)" />
  <span class="clear" id="clearBtn" onclick="clearSearch()" style="display:none">×</span>
</div>
<div class="filters">
  <div class="filter-label">GENRE</div>
  <div id="genreFilters" style="display:flex;flex-wrap:wrap;gap:6px;">
    <div class="chip on" onclick="toggleChip(this,'genre','All')">All</div>
    <div class="chip" onclick="toggleChip(this,'genre','Techno')">Techno</div>
    <div class="chip" onclick="toggleChip(this,'genre','House')">House</div>
    <div class="chip" onclick="toggleChip(this,'genre','Electronic')">Electronic</div>
    <div class="chip" onclick="toggleChip(this,'genre','Hardstyle')">Hardstyle</div>
    <div class="chip" onclick="toggleChip(this,'genre','Rock')">Rock</div>
    <div class="chip" onclick="toggleChip(this,'genre','Pop')">Pop</div>
  </div>
  <div class="filter-label">COUNTRY</div>
  <div id="countryFilters" style="display:flex;flex-wrap:wrap;gap:6px;">
    <div class="chip on" onclick="toggleChip(this,'country','All')">All</div>
    <div class="chip" onclick="toggleChip(this,'country','Netherlands')">Netherlands</div>
    <div class="chip" onclick="toggleChip(this,'country','Belgium')">Belgium</div>
    <div class="chip" onclick="toggleChip(this,'country','Germany')">Germany</div>
    <div class="chip" onclick="toggleChip(this,'country','Spain')">Spain</div>
    <div class="chip" onclick="toggleChip(this,'country','Portugal')">Portugal</div>
    <div class="chip" onclick="toggleChip(this,'country','Croatia')">Croatia</div>
  </div>
</div>
<div class="results-meta" id="resultsMeta"></div>
<div id="cardList"><div class="loading">LOADING...</div></div>
<script>
let allFestivals = [];
let activeGenre = 'All';
let activeCountry = 'All';
let searchQuery = '';
const COUNTRY_CODE = {'Netherlands':'NL','Belgium':'BE','Germany':'DE','Spain':'ES','Portugal':'PT','France':'FR','UK':'UK','Italy':'IT','Croatia':'HR','Hungary':'HU'};
fetch('/festivals').then(r => r.json()).then(data => { allFestivals = Array.isArray(data) ? data : []; render(); });
function onSearch(val) { searchQuery = val.toLowerCase(); document.getElementById('clearBtn').style.display = val ? 'block' : 'none'; render(); }
function clearSearch() { document.getElementById('searchInput').value = ''; document.getElementById('clearBtn').style.display = 'none'; searchQuery = ''; render(); }
function toggleChip(el, type, val) {
  const group = type === 'genre' ? 'genreFilters' : 'countryFilters';
  document.querySelectorAll('#' + group + ' .chip').forEach(c => c.classList.remove('on'));
  el.classList.add('on');
  if (type === 'genre') activeGenre = val; else activeCountry = val;
  render();
}
function render() {
  let list = [...allFestivals];
  if (searchQuery) list = list.filter(f => f.name?.toLowerCase().includes(searchQuery) || f.city?.toLowerCase().includes(searchQuery) || f.lineup?.some(a => a.toLowerCase().includes(searchQuery)));
  if (activeGenre !== 'All') list = list.filter(f => f.genres?.some(g => g.toLowerCase().includes(activeGenre.toLowerCase())));
  if (activeCountry !== 'All') list = list.filter(f => f.country?.toLowerCase() === activeCountry.toLowerCase());
  document.getElementById('resultsMeta').textContent = list.length + ' FESTIVALS';
  if (list.length === 0) { document.getElementById('cardList').innerHTML = '<div class="empty">NO FESTIVALS FOUND</div>'; return; }
  document.getElementById('cardList').innerHTML = list.map(f => {
    const code = COUNTRY_CODE[f.country] || '';
    const matched = searchQuery ? (f.lineup || []).filter(a => a.toLowerCase().includes(searchQuery)) : [];
    return '<a href="/festival_detail.html?id=' + f.id + '" class="card"><div class="card-header"><div class="fest-name">' + f.name + '</div>' + (code ? '<div class="country-badge">' + code + '</div>' : '') + '</div><div class="fest-meta">' + (f.start_date||'') + (f.end_date && f.end_date !== f.start_date ? ' → ' + f.end_date : '') + (f.city ? ' · ' + f.city : '') + '</div>' + (f.genres?.length ? '<div class="genre-tags">' + f.genres.map(g => '<div class="genre-tag">' + g + '</div>').join('') + '</div>' : '') + (matched.length ? '<div class="artist-match">↳ ' + matched.join(', ') + '</div>' : '') + '</a>';
  }).join('');
}
</script>
</body>
</html>
